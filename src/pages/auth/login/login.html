<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="login.css" />
    <title>Document</title>
  </head>

  <body>
    <form id="form">
      <h1 class="logo-text">SuperFood</h1>
      <h2 class="form-title">Iniciar Sesión</h2>
      <div class="input-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          autocomplete="off"
          placeholder="ejemplo@correo.com"
        />
      </div>
      <div class="input-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          name="password"
          autocomplete="off"
          placeholder="Ingresa tu contraseña"
        />
      </div>

      <button type="submit" id="ingresar-btn" class="disabled" disabled>Ingresar</button>
      
      <p class="register-text">
        ¿No tienes cuenta? <a href="../registro/registro.html">Regístrate</a>
      </p>
      
      <div class="test-accounts">
        <p class="test-title">Cuentas de prueba:</p>
        <p class="test-item">Admin: admin@food.com / admin123</p>
        <p class="test-item">Cliente: cliente@food.com / cliente123</p>
      </div>
    </form>

    <script type="module" src="./login.ts"></script>
  </body>
</html>
