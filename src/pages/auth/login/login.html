<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="login.css" />
    <title>Document</title>
  </head>

  <body>
    <form id="form">
      <h1>SuperFood</h1>
      <h2>Iniciar Sesión</h2>
      <div>
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          autocomplete="off"
          placeholder="example@example.com"
        />
      </div>
      <div>
        <label for="password">password</label>
        <input
          type="password"
          id="password"
          name="password"
          autocomplete="off"
          placeholder="********"
        />
      </div>

      <button type="submit" id="ingresar-btn" class="disabled">Ingresar</button>
      <p>
        ¿No tienes cuenta?
        <a href="../registro/registro.html">Regístrate aquí</a>
      </p>
      <p>Cuentas de prueba:</p>
      <ul>
        <li>Admin: admin@example.com / 123456</li>
        <li>Cliente: client@example.com / 123456</li>
      </ul>
    </form>

    <script type="module" src="./login.js"></script>
  </body>
</html>
