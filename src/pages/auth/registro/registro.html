<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../login/login.css" />
    <title>Document</title>
  </head>

  <body>
    <form id="form">
      <h1 class="logo-text">SuperFood</h1>
      <h2 class="form-title">Registro</h2>
      <div class="input-group">
        <label for="email">Nombre</label>
        <input
          type="name"
          id="name"
          name="name"
          autocomplete="off"
          placeholder="Ingresa tu nombre completo"
        />
      </div>
      <div class="input-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          autocomplete="off"
          placeholder="ejemplo@correo.com"
        />
      </div>
      <div class="input-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          name="password"
          autocomplete="off"
          placeholder="Ingresa tu contraseña"
        />
      </div>
      
      <button type="submit" id="registro-btn" class="disabled" disabled>Registrarse</button>
      
      <p class="register-text">
        ¿Ya tienes cuenta? <a href="../login/login.html">Inicia sesión</a>
      </p>
    </form>

    <script type="module" src="./registro.ts"></script>
  </body>
</html>
